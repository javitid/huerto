name: Deploy To GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --watch=false

  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject Firebase config for development
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FILE_ANALYSIS_ALLOWED_EMAIL: ${{ secrets.FILE_ANALYSIS_ALLOWED_EMAIL }}
        run: |
          cat <<EOF > src/environments/environment.local.ts
          export const environment = {
            production: false,
            firebase: {
              apiKey: '${FIREBASE_API_KEY}',
              authDomain: '${FIREBASE_AUTH_DOMAIN}',
              projectId: '${FIREBASE_PROJECT_ID}',
              appId: '${FIREBASE_APP_ID}',
              messagingSenderId: '${FIREBASE_MESSAGING_SENDER_ID}',
              storageBucket: '${FIREBASE_STORAGE_BUCKET}'
            },
            fileAnalysis: {
              allowedEmails: ['${FILE_ANALYSIS_ALLOWED_EMAIL}']
            }
          };
          EOF

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

  build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-tests
      - e2e-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Inject Firebase config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FILE_ANALYSIS_ALLOWED_EMAIL: ${{ secrets.FILE_ANALYSIS_ALLOWED_EMAIL }}
        run: |
          cat <<EOF > src/environments/environment.prod.ts
          export const environment = {
            production: true,
            firebase: {
              apiKey: '${FIREBASE_API_KEY}',
              authDomain: '${FIREBASE_AUTH_DOMAIN}',
              projectId: '${FIREBASE_PROJECT_ID}',
              appId: '${FIREBASE_APP_ID}',
              messagingSenderId: '${FIREBASE_MESSAGING_SENDER_ID}',
              storageBucket: '${FIREBASE_STORAGE_BUCKET}'
            },
            fileAnalysis: {
              allowedEmails: ['${FILE_ANALYSIS_ALLOWED_EMAIL}']
            }
          };
          EOF

      - name: Build Angular app for Pages
        run: npm run build:pages

      - name: Prepare SPA fallback
        run: |
          cp dist/huerto/index.html dist/huerto/404.html
          touch dist/huerto/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/huerto

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
