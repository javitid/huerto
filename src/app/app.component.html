<main class="app-dark min-h-screen bg-slate-950 text-slate-50">
  <div class="pointer-events-none fixed right-4 top-4 z-50 sm:right-6 sm:top-6">
    <div class="pointer-events-auto inline-flex items-center gap-3 rounded-2xl border border-white/10 bg-slate-900/80 px-3 py-2 shadow-lg shadow-slate-950/30 backdrop-blur">
      <label id="language-select-label" for="language-select" class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-300">
        {{ 'common.language' | t }}
      </label>
      <p-select
        id="language-select"
        inputId="language-select"
        [options]="languageOptions"
        optionLabel="shortCode"
        optionValue="code"
        [ngModel]="selectedLanguage"
        (ngModelChange)="setLanguage($event)"
        appendTo="body"
        ariaLabelledBy="language-select-label"
        [focusOnHover]="false"
        [checkmark]="true"
        class="language-select w-[7.5rem]"
      >
        <ng-template #selectedItem let-option>
          @if (option) {
            <div class="flex items-center gap-2">
              <span class="text-base leading-none">{{ option.flag }}</span>
              <span class="text-xs font-black uppercase tracking-[0.24em] text-white">{{ option.shortCode }}</span>
            </div>
          }
        </ng-template>
        <ng-template #item let-option>
          <div class="flex items-center gap-3 rounded-xl px-1 py-1">
            <span class="text-lg leading-none">{{ option.flag }}</span>
            <span class="text-sm font-semibold uppercase tracking-[0.22em] text-white">{{ option.shortCode }}</span>
          </div>
        </ng-template>
        <ng-template #dropdownicon>
          <i class="pi pi-angle-down text-xs text-slate-300"></i>
        </ng-template>
      </p-select>
    </div>
  </div>
  <router-outlet></router-outlet>
</main>
